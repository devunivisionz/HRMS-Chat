services:
  - type: web
    name: hrms-api
    runtime: node
    plan: free
    buildCommand: "cd apps/api && NODE_OPTIONS='--max-old-space-size=64' pnpm install --no-frozen-lockfile --prod && NODE_OPTIONS='--max-old-space-size=64' pnpm build"
    startCommand: "cd apps/api && NODE_OPTIONS='--max-old-space-size=64' node dist/index.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: NODE_OPTIONS
        value: "--max-old-space-size=64"
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: hrms-postgres
    databaseName: hrms_dev
    user: hrms_user
    plan: free

  - name: hrms-redis
    plan: free
