services:
  - type: web
    name: hrms-api
    runtime: node
    plan: free
    buildCommand: "cd apps/api && pnpm install && pnpm build"
    startCommand: "cd apps/api && pnpm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString

databases:
  - name: hrms-postgres
    databaseName: hrms_dev
    user: hrms_user
    plan: free

  - name: hrms-redis
    plan: free
