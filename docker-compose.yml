version: '3.9'

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hrms_dev
      POSTGRES_USER:     hrms_user
      POSTGRES_PASSWORD: hrms_dev_password
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U hrms_user -d hrms_dev']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: hrms_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: hrms_user
      MONGO_INITDB_ROOT_PASSWORD: hrms_dev_password
      MONGO_INITDB_DATABASE:      hrms
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:     ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass hrms_dev_password
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ['CMD', 'redis-cli', '-a', 'hrms_dev_password', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Redis GUI (free) ────────────────────────────────────
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: hrms_redis_insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    depends_on:
      - redis

  # ─── MailHog (local email testing — free) ────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hrms_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI → http://localhost:8025

volumes:
  pg_data:
  mongo_data:
  redis_data:

networks:
  default:
    name: hrms_network
